name: Process Video Clips
on:
  repository_dispatch:
    types: [process-clips]

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Trim clips from local source
        env:
          PROJECT_TITLE: ${{ github.event.client_payload.project_title }}
          CLIPS_JSON:    ${{ toJson(github.event.client_payload.clips) }}
          SOURCES_JSON:  ${{ toJson(github.event.client_payload.sources) }}
          SOURCE_VIDEO:  ${{ github.event.client_payload.source_video }}
        run: |
          python3 - << 'PYEOF'
          import json, os, re, subprocess, sys

          title    = os.environ['PROJECT_TITLE']
          clips    = json.loads(os.environ['CLIPS_JSON'])
          # `sources` is the new array; fall back to legacy single source_video.
          try:    sources = json.loads(os.environ.get('SOURCES_JSON') or 'null') or []
          except: sources = []
          legacy_src = os.environ.get('SOURCE_VIDEO') or ''
          if not sources and legacy_src:
              sources = [legacy_src]
          if not sources:
              print('::error::No source videos provided')
              sys.exit(1)
          default_src = sources[0]

          os.makedirs('assets/clips', exist_ok=True)
          slug = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')
          print(f'Trimming clips for {title!r} ({len(sources)} source(s)). Default: {default_src}')

          def to_sec(tc):
              s = str(tc).strip()
              if not s: return 0
              parts = s.split(':')
              try:
                  if len(parts) == 1: return float(parts[0])
                  if len(parts) == 2: return int(parts[0])*60 + float(parts[1])
                  if len(parts) == 3: return int(parts[0])*3600 + int(parts[1])*60 + float(parts[2])
              except ValueError: return 0
              return 0

          for i, clip in enumerate(clips):
              start, end = to_sec(clip.get('start', 0)), to_sec(clip.get('end', 0))
              if end <= start:
                  print(f'Skip clip {i}: invalid range {start}-{end}'); continue
              # Per-clip source override; must be one of the project's sources.
              clip_src = clip.get('sourceVideo') or default_src
              if clip_src not in sources:
                  print(f'  Clip {i} requested source {clip_src!r} not in project sources — falling back to default')
                  clip_src = default_src
              if not os.path.exists(clip_src):
                  print(f'::error::Source not found: {clip_src}')
                  sys.exit(1)
              out = f'assets/clips/{slug}-{i}.mp4'
              print(f'Trim clip {i}: {start}s → {end}s  src={clip_src} → {out}')
              r = subprocess.run([
                  'ffmpeg','-y','-loglevel','error','-i', clip_src,
                  '-ss', str(start), '-to', str(end),
                  '-c:v','libx264','-crf','28','-preset','fast',
                  '-pix_fmt','yuv420p','-vf','scale=-2:min(480\\,ih)',
                  '-an','-movflags','+faststart', out
              ])
              if r.returncode == 0:
                  clip['clipFile'] = out
                  print(f'  OK: {out}')
              else:
                  print(f'  FAILED clip {i}')

          # Update data.json
          with open('data.json') as f: data_json = json.load(f)
          for p in data_json['projects']:
              if p.get('title') == title:
                  p['clips'] = clips; break
          with open('data.json', 'w') as f: json.dump(data_json, f, indent=2)
          print('data.json updated')
          PYEOF

      - name: Commit clip files
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/clips/ data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"; exit 0
          fi
          git commit -m "Embed clips: ${{ github.event.client_payload.project_title }}"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"; exit 0
            fi
            echo "Push failed, rebasing and retrying (attempt $attempt)"
            git pull --rebase origin main || exit 1
            sleep 2
          done
          echo "::error::Push failed after 5 attempts"; exit 1
