name: Process Video Clips
on:
  repository_dispatch:
    types: [process-clips]

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs
          python3 -m pip install --upgrade yt-dlp
          yt-dlp --version
          node --version

      - name: Download & trim clips
        env:
          PROJECT_TITLE: ${{ github.event.client_payload.project_title }}
          YOUTUBE_URL: ${{ github.event.client_payload.youtube_url }}
          CLIPS_JSON: ${{ toJson(github.event.client_payload.clips) }}
        run: |
          python3 - << 'PYEOF'
          import json, os, re, subprocess, sys

          title  = os.environ['PROJECT_TITLE']
          yt_url = os.environ['YOUTUBE_URL']
          clips  = json.loads(os.environ['CLIPS_JSON'])

          os.makedirs('assets/clips', exist_ok=True)
          slug = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')
          src  = '/tmp/source.mp4'

          def to_sec(tc):
              parts = str(tc).split(':')
              if len(parts) == 2: return int(parts[0]) * 60 + int(parts[1])
              if len(parts) == 3: return int(parts[0]) * 3600 + int(parts[1]) * 60 + int(parts[2])
              return int(tc)

          # Download full source video. YouTube blocks naive requests from
          # cloud IPs ("Sign in to confirm you're not a bot"), so try a series
          # of player clients — newer ones (tv_simply, web_safari) tend to
          # bypass the bot check.
          print(f'Downloading from {yt_url}')
          CLIENTS_TO_TRY = ['tv_simply', 'web_safari', 'mweb', 'android_vr', 'ios']
          dl = None
          for client in CLIENTS_TO_TRY:
              print(f'--- Trying player_client={client} ---')
              if os.path.exists(src):
                  os.remove(src)
              dl = subprocess.run([
                  'yt-dlp',
                  '--extractor-args', f'youtube:player_client={client}',
                  '-f', 'bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best[height<=720]',
                  '--merge-output-format', 'mp4',
                  '--no-playlist',
                  '--retries', '3',
                  '--fragment-retries', '3',
                  '-o', src,
                  yt_url
              ])
              if dl.returncode == 0 and os.path.exists(src):
                  print(f'  SUCCESS with {client}')
                  break
              print(f'  Failed with {client}, trying next…')
          if not dl or dl.returncode != 0 or not os.path.exists(src):
              print('All yt-dlp clients failed — YouTube is blocking this runner.')
              print('Workaround: upload the source MP4 manually to assets/videos/'
                    ' and use that path as the project video URL.')
              sys.exit(1)
          print(f'Source ready: {os.path.getsize(src)} bytes')

          # Trim each clip into a silent, looping mp4
          for i, clip in enumerate(clips):
              start = to_sec(clip.get('start', 0))
              end   = to_sec(clip.get('end',   0))
              if end <= start:
                  print(f'Skipping clip {i}: invalid range {start}-{end}'); continue
              out = f'assets/clips/{slug}-{i}.mp4'
              print(f'Trimming clip {i}: {start}s → {end}s → {out}')
              r = subprocess.run([
                  'ffmpeg', '-y', '-i', src,
                  '-ss', str(start), '-to', str(end),
                  '-c:v', 'libx264', '-crf', '28', '-preset', 'fast',
                  '-pix_fmt', 'yuv420p', '-vf', 'scale=-2:min(480\\,ih)',
                  '-an', '-movflags', '+faststart', out
              ])
              if r.returncode == 0:
                  clip['clipFile'] = out
                  print(f'  OK: {out}')
              else:
                  print(f'  FAILED clip {i}')

          # Update data.json with clipFile paths
          with open('data.json') as f:
              data_json = json.load(f)
          for p in data_json['projects']:
              if p.get('title') == title:
                  p['clips'] = clips
                  break
          with open('data.json', 'w') as f:
              json.dump(data_json, f, indent=2)
          print('data.json updated')
          PYEOF

      - name: Commit clip files
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/clips/ data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Embed clips: ${{ github.event.client_payload.project_title }}"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed, rebasing and retrying (attempt $attempt)"
            git pull --rebase origin main || exit 1
            sleep 2
          done
          echo "Push failed after 5 attempts"
          exit 1
