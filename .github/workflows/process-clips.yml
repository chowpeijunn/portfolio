name: Process Video Clips
on:
  repository_dispatch:
    types: [process-clips]

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y ffmpeg

      - name: Fetch via Piped + trim clips
        env:
          PROJECT_TITLE: ${{ github.event.client_payload.project_title }}
          YOUTUBE_URL: ${{ github.event.client_payload.youtube_url }}
          CLIPS_JSON: ${{ toJson(github.event.client_payload.clips) }}
        run: |
          python3 - << 'PYEOF'
          import json, os, re, subprocess, sys, urllib.request, urllib.error

          title  = os.environ['PROJECT_TITLE']
          yt_url = os.environ['YOUTUBE_URL']
          clips  = json.loads(os.environ['CLIPS_JSON'])

          os.makedirs('assets/clips', exist_ok=True)
          slug = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')
          src  = '/tmp/source.mp4'

          # Extract YouTube video ID
          m = re.search(r'(?:v=|youtu\.be/|/embed/)([a-zA-Z0-9_-]{11})', yt_url)
          if not m:
              print(f'Could not parse video ID from: {yt_url}'); sys.exit(1)
          vid_id = m.group(1)
          print(f'Video ID: {vid_id}')

          # Try public Piped instances to get stream URLs
          PIPED_INSTANCES = [
              'https://pipedapi.kavin.rocks',
              'https://pipedapi.tokhmi.xyz',
              'https://api.piped.yt',
              'https://pipedapi.moomoo.me',
          ]
          streams = None
          for instance in PIPED_INSTANCES:
              url = f'{instance}/streams/{vid_id}'
              print(f'Trying {url}')
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      streams = json.loads(r.read())
                  print(f'  OK')
                  break
              except Exception as e:
                  print(f'  Failed: {e}')

          if not streams:
              print('All Piped instances failed'); sys.exit(1)

          # Pick best video stream (mp4 preferred, ≤720p)
          vs = [s for s in streams.get('videoStreams', [])
                if s.get('videoOnly') and re.match(r'\d+p', s.get('quality',''))]
          vs_mp4 = [s for s in vs if 'mp4' in s.get('mimeType','')]
          pool = vs_mp4 if vs_mp4 else vs
          pool_720 = [s for s in pool if int(s['quality'].rstrip('p')) <= 720]
          pool_720.sort(key=lambda s: int(s['quality'].rstrip('p')), reverse=True)
          v_stream = pool_720[0] if pool_720 else None

          # Pick best audio stream
          as_ = streams.get('audioStreams', [])
          as_.sort(key=lambda s: s.get('bitrate', 0), reverse=True)
          a_stream = as_[0] if as_ else None

          if not v_stream:
              print('No suitable video stream found'); sys.exit(1)

          print(f'Downloading video stream: {v_stream["quality"]} {v_stream.get("mimeType","")}')
          v_tmp = '/tmp/v_stream'
          a_tmp = '/tmp/a_stream'
          subprocess.run(['curl', '-sL', '--max-time', '300', '-o', v_tmp, v_stream['url']], check=True)

          if a_stream:
              print(f'Downloading audio stream: {a_stream.get("quality","?")} {a_stream.get("mimeType","")}')
              subprocess.run(['curl', '-sL', '--max-time', '120', '-o', a_tmp, a_stream['url']], check=True)
              print('Muxing video + audio')
              subprocess.run(['ffmpeg', '-y', '-i', v_tmp, '-i', a_tmp, '-c', 'copy', src], check=True)
          else:
              os.rename(v_tmp, src)

          print(f'Source ready: {os.path.getsize(src)} bytes')

          def to_sec(tc):
              parts = str(tc).split(':')
              if len(parts) == 2: return int(parts[0]) * 60 + int(parts[1])
              if len(parts) == 3: return int(parts[0]) * 3600 + int(parts[1]) * 60 + int(parts[2])
              return int(tc)

          for i, clip in enumerate(clips):
              start = to_sec(clip.get('start', 0))
              end   = to_sec(clip.get('end',   0))
              out   = f'assets/clips/{slug}-{i}.mp4'
              print(f'Trimming clip {i}: {start}s → {end}s → {out}')
              r = subprocess.run([
                  'ffmpeg', '-y', '-i', src,
                  '-ss', str(start), '-to', str(end),
                  '-c:v', 'libx264', '-crf', '28', '-preset', 'fast',
                  '-pix_fmt', 'yuv420p', '-vf', 'scale=-2:min(480\\,ih)',
                  '-an', '-movflags', '+faststart', out
              ])
              if r.returncode == 0:
                  clip['clipFile'] = out
                  print(f'  OK: {out}')
              else:
                  print(f'  FAILED clip {i}')

          with open('data.json') as f:
              data_json = json.load(f)
          for p in data_json['projects']:
              if p.get('title') == title:
                  p['clips'] = clips
                  break
          with open('data.json', 'w') as f:
              json.dump(data_json, f, indent=2)
          print('data.json updated')
          PYEOF

      - name: Commit clip files
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/clips/ data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Embed clips: ${{ github.event.client_payload.project_title }}"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed, rebasing and retrying (attempt $attempt)"
            git pull --rebase origin main || exit 1
            sleep 2
          done
          echo "Push failed after 5 attempts"
          exit 1
