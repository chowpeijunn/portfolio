<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23E8E6DF'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial,sans-serif' font-weight='700' font-size='14' fill='%230C0E1A'>PJ</text></svg>">
<title>Portfolio Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --muted: #666;
  --accent: #4f8ef7;
  --warn: #f5a623;
  --danger: #e05252;
  --success: #4caf50;
  --radius: 8px;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 13px; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px; height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-title { font-weight: 700; font-size: 14px; }
.topbar-sub { color: var(--muted); font-size: 12px; }
.topbar-spacer { flex: 1; }
.status-msg { font-size: 12px; color: var(--muted); transition: color 0.3s; }
.status-msg.ok { color: var(--success); }
.status-msg.err { color: var(--danger); }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius);
  border: none; cursor: pointer; font-size: 12px; font-weight: 600;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 280px 1fr; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-search {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px; outline: none;
}
.sidebar-search:focus { border-color: var(--accent); }
.project-list { flex: 1; overflow-y: auto; padding: 6px; }
.project-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: 7px; cursor: pointer;
  border: 1px solid transparent; margin-bottom: 2px;
  transition: background 0.1s;
}
.project-item:hover { background: var(--surface2); }
.project-item.active { background: #1c2840; border-color: var(--accent); }
.project-item.dirty { border-color: var(--warn); }
.project-item.active.dirty { background: #241c0d; border-color: var(--warn); }
.drag-handle { color: var(--muted); cursor: grab; font-size: 14px; flex-shrink: 0; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.item-thumb {
  width: 56px; height: 35px; border-radius: 5px; object-fit: cover;
  background: var(--surface2); flex-shrink: 0;
}
.item-thumb-placeholder {
  width: 56px; height: 35px; border-radius: 5px;
  background: var(--surface2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--muted);
}
.item-info { flex: 1; min-width: 0; }
.item-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-cat { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 1px; }
.add-btn-row { padding: 8px 6px; border-top: 1px solid var(--border); }

/* ── MAIN EDITOR ── */
.editor { overflow-y: auto; padding: 24px; }
.editor-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); flex-direction: column; gap: 8px; }
.editor-empty svg { opacity: 0.3; }
.section { margin-bottom: 28px; }
.section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 10px; color: var(--text);
  font-size: 13px; outline: none; font-family: inherit;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 60px; }
.field select option { background: var(--surface2); }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Tags */
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px; font-size: 11px; cursor: default;
}
.tag-chip.active { background: #1c2840; border-color: var(--accent); color: var(--accent); }
.tag-chip input[type=checkbox] { display: none; }

/* Thumbnail picker */
.thumb-preview-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
.thumb-preview {
  width: 160px; height: 100px; border-radius: var(--radius); object-fit: cover;
  background: var(--surface2); flex-shrink: 0; border: 1px solid var(--border);
}
.thumb-preview-placeholder {
  width: 160px; height: 100px; border-radius: var(--radius);
  background: var(--surface2); flex-shrink: 0; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 11px;
}
.thumb-preview-info { flex: 1; }
.thumb-path-display {
  font-size: 11px; color: var(--muted); word-break: break-all;
  background: var(--surface2); border-radius: 5px; padding: 6px 8px; margin-bottom: 8px;
}
.thumb-path-display.is-url { color: var(--warn); }

.thumb-grid-toggle { font-size: 11px; color: var(--accent); cursor: pointer; text-decoration: underline; }

/* Upload */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 16px 12px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative; margin-bottom: 10px;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: rgba(79,142,247,0.05); }
.upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-zone-label { font-size: 12px; color: var(--muted); pointer-events: none; }
.upload-zone-label strong { color: var(--text); }
.upload-progress { font-size: 11px; color: var(--accent); margin-top: 6px; display: none; }
.upload-progress.visible { display: block; }
.thumb-grid-wrap { margin-top: 10px; }
.thumb-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px;
  max-height: 300px; overflow-y: auto; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px; background: var(--surface);
}
.thumb-opt {
  cursor: pointer; border-radius: 5px; overflow: hidden;
  border: 2px solid transparent; transition: border-color 0.1s;
}
.thumb-opt:hover { border-color: var(--muted); }
.thumb-opt.selected { border-color: var(--accent); }
.thumb-opt img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface2); }
.thumb-opt-label { font-size: 9px; color: var(--muted); padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thumb-opt.selected .thumb-opt-label { color: var(--accent); }

/* Credits */
.credits-list { display: flex; flex-direction: column; gap: 6px; }
.credit-row { display: flex; gap: 6px; align-items: center; }
.credit-row input { flex: 1; }
.credit-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; }
.credit-remove:hover { color: var(--danger); }

/* Extra videos */
.videos-list { display: flex; flex-direction: column; gap: 6px; }
.video-row { display: flex; gap: 6px; align-items: center; }
.video-row input { flex: 1; }
.video-upload-btn { flex-shrink: 0; }
.video-upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Clips */
.clips-list { display: flex; flex-direction: column; gap: 6px; }
.clip-row { display: flex; gap: 6px; align-items: center; }
.clip-row .clip-label { flex: 1.2; }
.clip-row .clip-time { flex: 0.7; min-width: 0; }
.clip-row .clip-source {
  flex: 1; min-width: 80px; max-width: 160px;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 6px; font-size: 11px;
}
.sources-list { display: flex; flex-direction: column; gap: 6px; }
.clip-hint { font-size: 10px; color: var(--muted); margin-top: 4px; }
.clip-scrub-btn { flex-shrink: 0; font-size: 13px; padding: 4px 8px; }
.clip-scrub-btn.active { background: #1c2840; border-color: var(--accent); color: var(--accent); }

/* Persistent operation toasts (bottom-right) — survive project switches.
   Used by Save & extract clips and by Source video upload/compression. */
.op-toast-stack {
  position: fixed; bottom: 16px; right: 16px; z-index: 9000;
  display: flex; flex-direction: column-reverse; gap: 8px;
  pointer-events: none;
}
.op-toast {
  pointer-events: auto;
  width: 320px; padding: 12px 14px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  font-size: 12px; color: var(--text);
  display: none;
}
.op-toast.visible { display: block; }
.op-toast .op-title { font-weight: 600; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.op-toast .op-title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.op-toast .op-close { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
.op-toast .op-close:hover { color: var(--text); }
.op-toast .op-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.op-toast .op-fill {
  height: 100%; width: 0%; border-radius: 2px;
  background: var(--accent);
  transition: width 0.4s ease, background 0.3s;
}
.op-toast .op-fill.success { background: var(--success); }
.op-toast .op-fill.error   { background: var(--danger); }
.op-toast .op-label { font-size: 11px; color: var(--dim); word-break: break-word; }
.op-toast .op-label a { color: var(--accent); text-decoration: underline; }

/* Status pill for the Source video field */
.field-status {
  display: inline-block;
  margin-left: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  vertical-align: middle;
}
.field-status.ok      { background: rgba(76, 175, 130, 0.18); color: var(--success); }
.field-status.missing { background: rgba(255, 87, 87, 0.18);  color: var(--danger);  }
.btn-save-extract {
  margin-top: 8px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-save-extract:hover:not(:disabled) { background: var(--accent-h); border-color: var(--accent-h); }
.btn-save-extract:disabled { opacity: 0.5; cursor: not-allowed; }

/* Inline clip preview player */
.clip-preview {
  margin: -2px 0 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.clip-player-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
}
.clip-player-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}
.clip-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
}
.clip-current-time {
  font-size: 12px;
  color: var(--text);
  min-width: 44px;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
.clip-range-bar {
  position: relative;
  height: 4px;
  background: var(--surface2);
  margin: 0 10px 10px;
  border-radius: 2px;
  overflow: visible;
}
.clip-range-track {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 2px;
}
.clip-range-fill {
  position: absolute;
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: left 0.15s, width 0.15s;
}

/* Delete zone */
.danger-zone { border: 1px solid #3a1a1a; border-radius: var(--radius); padding: 16px; background: #1a0e0e; }
.danger-zone p { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* Dragging */
.project-item.dragging { opacity: 0.4; }
.project-item.drag-over { border-color: var(--accent); background: var(--surface2); }

.cat-badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 6px; border-radius: 3px;
}
.cat-weddings { background: #2a1a2a; color: #c084fc; }
.cat-corporate { background: #1a2a1a; color: #86efac; }
.cat-events { background: #1a1a2a; color: #93c5fd; }
.cat-tvc { background: #2a1a1a; color: #fca5a5; }

/* ── GRID VIEW OVERLAY ── */
.grid-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: #080808;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.grid-overlay.visible { opacity: 1; pointer-events: all; }

.grid-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 52px; flex-shrink: 0;
  background: #0f0f0f; border-bottom: 1px solid #222;
}
.grid-topbar-title { font-size: 13px; font-weight: 700; }
.grid-topbar-hint { font-size: 11px; color: var(--muted); }
.grid-col-controls { display: flex; gap: 6px; align-items: center; }
.grid-col-controls span { font-size: 11px; color: var(--muted); }
.col-btn {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.col-btn:hover { background: #333; }

.grid-canvas {
  flex: 1; overflow-y: auto; padding: 20px;
}

.grid-board {
  display: grid;
  gap: 10px;
}

/* Grid cards */
.gc {
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  cursor: grab;
  border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.1s, box-shadow 0.1s;
  user-select: none;
  background: #1a1a1a;
}
.gc:active { cursor: grabbing; }
.gc:hover { border-color: #444; }
.gc.gc-dragging {
  opacity: 0.35;
  transform: scale(0.97);
}
.gc.gc-drag-over { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent); }

.gc img {
  width: 100%; aspect-ratio: 16/9;
  object-fit: cover; display: block;
  pointer-events: none;
}
.gc-no-thumb {
  width: 100%; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  background: #1a1a1a; color: #444; font-size: 11px;
  pointer-events: none;
}
.gc-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 8px 7px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  pointer-events: none;
}
.gc-label-title {
  font-size: 11px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gc-label-cat {
  font-size: 9px; color: rgba(255,255,255,0.55);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.gc-num {
  position: absolute; top: 6px; left: 6px;
  background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.5);
  font-size: 9px; font-weight: 700;
  padding: 2px 5px; border-radius: 3px;
  pointer-events: none;
}

/* Hub placeholder in grid */
.gc-hub {
  background: #141420;
  border: 2px dashed #333 !important;
  cursor: default;
  pointer-events: none;
}
.gc-hub:hover { border-color: #333 !important; }
.gc-hub-inner {
  width: 100%; aspect-ratio: 16/9;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
}
.gc-hub-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; }
.gc-hub-sub { font-size: 10px; color: rgba(255,255,255,0.2); }
/* 4-col: hub spans 2 cols but inner card is 1-col wide, centred */
.gc-hub-inner-single {
  /* 1 card wide = half of 2-col span minus half the 10px gap */
  width: calc(50% - 5px);
  aspect-ratio: 16/9;
  background: #141420;
  border: 2px dashed #333;
  border-radius: 6px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
}

/* Drop zone at end */
.gc-drop-end {
  border: 2px dashed transparent; border-radius: 6px; aspect-ratio: 16/9;
  transition: border-color 0.15s, background 0.15s;
  cursor: default;
}
.gc-drop-end.gc-drag-over-end {
  border-color: var(--accent);
  background: rgba(79, 142, 247, 0.08);
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Portfolio Admin</div>
  <div class="topbar-sub" id="projectCount"></div>
  <div class="topbar-spacer"></div>
  <span class="status-msg" id="statusMsg"></span>
  <button class="btn btn-ghost" onclick="openGridView()">⊞ Arrange</button>
  <button class="btn btn-ghost" onclick="window.open('/', '_blank')">View Site</button>
  <button class="btn btn-primary" onclick="saveAll()">Save</button>
  <button class="btn" style="background:#22c55e;color:#fff" onclick="saveAndPublish()">Save &amp; Publish ↗</button>
  <button class="btn btn-ghost" id="ghTokenBtn" onclick="promptGhToken()" title="Set GitHub token for uploads" style="font-size:11px;padding:6px 10px;">🔑 Token</button>
</div>

<!-- GRID VIEW OVERLAY -->
<div class="grid-overlay" id="gridOverlay">
  <div class="grid-topbar">
    <div class="grid-topbar-title">Arrange Projects</div>
    <div class="grid-topbar-hint">Drag to reorder · Hub card marks where it sits in the grid</div>
    <div class="topbar-spacer"></div>
    <div class="grid-col-controls">
      <span>Columns:</span>
      <button class="col-btn" onclick="setGridCols(2)">2</button>
      <button class="col-btn" onclick="setGridCols(3)">3</button>
      <button class="col-btn" onclick="setGridCols(4)">4</button>
      <button class="col-btn" onclick="setGridCols(5)">5</button>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="closeGridView()">Cancel</button>
    <button class="btn btn-primary btn-sm" onclick="applyGridView()">Apply Order</button>
  </div>
  <div class="grid-canvas">
    <div class="grid-board" id="gridBoard"></div>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <input class="sidebar-search" type="text" placeholder="Search projects…" oninput="filterList(this.value)">
    </div>
    <div style="padding:8px 12px;border-bottom:1px solid var(--border);">
      <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;">Showreel</div>
      <input id="showreelUrlInput" type="text" placeholder="YouTube URL…"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;"
        oninput="data.showreel = this.value;"
        onfocus="this.style.borderColor='var(--accent)'"
        onblur="this.style.borderColor='var(--border)'" />
      <div style="font-size:10px;color:var(--muted);margin:6px 0 4px;">Caption</div>
      <input id="showreelCopyInput" type="text" placeholder="Weddings | Corporate | …"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;"
        oninput="data.showreelCopy = this.value;"
        onfocus="this.style.borderColor='var(--accent)'"
        onblur="this.style.borderColor='var(--border)'" />
      <div style="font-size:10px;color:var(--muted);margin:6px 0 4px;">Direct video file <span style="opacity:0.5">(overrides YouTube embed)</span></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="showreelVideoInput" type="text" placeholder="assets/videos/showreel.mp4"
          style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:11px;font-family:monospace;outline:none;"
          oninput="data.showreelVideo = this.value;"
          onfocus="this.style.borderColor='var(--accent)'"
          onblur="this.style.borderColor='var(--border)'" />
        <button class="btn btn-ghost btn-sm" onclick="pickShowreelVideo()" style="flex-shrink:0;font-size:11px;">↑ Upload</button>
      </div>
      <div id="showreelVideoProgress" style="font-size:11px;color:var(--accent);margin-top:4px;display:none;"></div>
    </div>
    <div class="project-list" id="projectList"></div>
    <div class="add-btn-row">
      <button class="btn btn-ghost" style="width:100%" onclick="addProject()">+ New Project</button>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor" id="editor">
    <div class="editor-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <span>Select a project to edit</span>
    </div>
  </div>

</div>

<!-- THUMB PICKER (hidden grid, toggled per project) -->

<script>
const CATEGORIES = ['weddings', 'corporate', 'events', 'tvc'];
const ALL_TAGS = ['weddings', 'corporate', 'events', 'tvc'];

let data = null;
let thumbFiles = [];
let selectedIdx = null;
let dirty = new Set();
let thumbGridVisible = false;
let dragSrcIdx = null;
let filterQuery = '';

function getAdminSecret() {
  return localStorage.getItem('adminSecret') || '';
}

async function init() {
  updateTokenBtn(!!getGhToken());
  const secret = getAdminSecret();
  const [dataRes, thumbRes] = await Promise.all([
    fetch('/data.json').then(r => r.json()),
    fetch('/api/thumbs', { headers: { 'x-admin-secret': secret } }).then(async r => {
      if (r.status === 401) throw Object.assign(new Error('Unauthorized'), { status: 401 });
      return r.json();
    })
  ]);
  data = dataRes;
  thumbFiles = Array.isArray(thumbRes) ? thumbRes : [];
  const showreelInput = document.getElementById('showreelUrlInput');
  if (showreelInput) showreelInput.value = data.showreel || '';
  const showreelCopyInput = document.getElementById('showreelCopyInput');
  if (showreelCopyInput) showreelCopyInput.value = data.showreelCopy || '';
  const showreelVideoInput = document.getElementById('showreelVideoInput');
  if (showreelVideoInput) showreelVideoInput.value = data.showreelVideo || '';
  renderList();
  updateCount();
}

function updateCount() {
  document.getElementById('projectCount').textContent = `${data.projects.length} projects`;
}

function filterList(q) {
  filterQuery = q.toLowerCase();
  renderList();
}

function catBadge(cat) {
  return `<span class="cat-badge cat-${cat}">${cat}</span>`;
}

function renderList() {
  const list = document.getElementById('projectList');
  list.innerHTML = '';
  data.projects.forEach((p, i) => {
    if (filterQuery && !p.title.toLowerCase().includes(filterQuery) && !p.category.includes(filterQuery)) return;

    const item = document.createElement('div');
    item.className = 'project-item' + (i === selectedIdx ? ' active' : '') + (dirty.has(i) ? ' dirty' : '');
    item.dataset.idx = i;
    item.draggable = true;

    const thumbSrc = p.thumb || '';
    const hasImg = !!thumbSrc;

    item.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      ${hasImg
        ? `<img class="item-thumb" src="${thumbSrc}" onerror="this.style.display='none'" alt="">`
        : `<div class="item-thumb-placeholder">no thumb</div>`
      }
      <div class="item-info">
        <div class="item-title">${p.title || 'Untitled'}</div>
        <div class="item-cat">${catBadge(p.category || '—')}</div>
      </div>
    `;

    item.onclick = (e) => {
      if (e.target.classList.contains('drag-handle')) return;
      selectProject(i);
    };

    // Drag events
    item.addEventListener('dragstart', (e) => {
      dragSrcIdx = i;
      setTimeout(() => item.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', (e) => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', (e) => {
      e.preventDefault();
      item.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      const moved = data.projects.splice(dragSrcIdx, 1)[0];
      const newIdx = dragSrcIdx < i ? i - 1 : i;
      data.projects.splice(newIdx, 0, moved);
      dirty.add(newIdx);
      selectedIdx = newIdx;
      dragSrcIdx = null;
      renderList();
      renderEditor();
    });

    list.appendChild(item);
  });
}

function selectProject(idx) {
  selectedIdx = idx;
  thumbGridVisible = false;
  renderList();
  renderEditor();
}

// ── EDITOR ────────────────────────────────────────────────

function renderEditor() {
  // Destroy any open clip preview players before re-rendering
  Object.keys(_clipPlayers).forEach(ci => closeClipPreview(Number(ci)));

  const editor = document.getElementById('editor');
  if (selectedIdx === null) {
    editor.innerHTML = `<div class="editor-empty"><span>Select a project to edit</span></div>`;
    return;
  }
  const p = data.projects[selectedIdx];

  const tagsHtml = ALL_TAGS.map(tag => {
    const active = (p.tags || []).includes(tag);
    return `<label class="tag-chip ${active ? 'active' : ''}">
      <input type="checkbox" ${active ? 'checked' : ''} onchange="toggleTag('${tag}', this.checked)"> ${tag}
    </label>`;
  }).join('');

  const creditsHtml = (p.credits || []).map((c, ci) => creditRowHtml(c, ci)).join('');
  const videosHtml = (p.videos || []).map((v, vi) => videoRowHtml(v, vi)).join('');

  const thumbSrc = p.thumb || '';
  const isUrl = thumbSrc.startsWith('http');
  const thumbPreview = thumbSrc
    ? `<img class="thumb-preview" src="${thumbSrc}" onerror="this.className='thumb-preview-placeholder';this.outerHTML='<div class=\\'thumb-preview-placeholder\\'>broken link</div>'" alt="">`
    : `<div class="thumb-preview-placeholder">no thumbnail</div>`;

  editor.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h2 style="font-size:18px;font-weight:700;">${p.title || 'Untitled'}</h2>
      <button class="btn btn-danger btn-sm" onclick="deleteProject()">Delete</button>
    </div>

    <!-- BASICS -->
    <div class="section">
      <div class="section-title">Basics</div>
      <div class="row-2">
        <div class="field">
          <label>Title</label>
          <input type="text" value="${esc(p.title || '')}" oninput="update('title', this.value)">
        </div>
        <div class="field">
          <label>Client</label>
          <input type="text" value="${esc(p.client || '')}" oninput="update('client', this.value)">
        </div>
      </div>
      <div class="field">
        <label>Position in grid</label>
        <div style="display:flex;align-items:center;gap:8px;height:38px;">
          <span style="font-size:12px;color:var(--muted);">${p.slot === 'before' ? 'Before hub card' : 'After hub card'}</span>
          <button class="btn btn-ghost btn-sm" onclick="openGridView()" style="font-size:11px;">⊞ Change in Arrange view</button>
        </div>
      </div>
      <div class="field">
        <label>Tags</label>
        <div class="tags-row">${tagsHtml}</div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="section">
      <div class="section-title">Video</div>
      <div class="field">
        <label>Main video URL (YouTube)</label>
        <input type="text" value="${esc(p.video || '')}" placeholder="https://youtu.be/..." oninput="update('video', this.value)">
      </div>
      <div class="field">
        <label>
          Source video${(getAllSources(p).length > 1) ? 's' : ''}
          <span class="field-status ${getAllSources(p).length ? 'ok' : 'missing'}" id="sourceVideoStatus">${getAllSources(p).length ? `✓ ${getAllSources(p).length} uploaded` : '○ Not uploaded'}</span>
          <span style="opacity:0.5;font-size:10px;">(used by Save &amp; extract — any size mp4/mov; auto-compressed to 720p in browser. Add multiple if a project has multiple films.)</span>
        </label>
        <div class="sources-list" id="sourcesList">${sourcesHtml(p)}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="pickSourceVideo()">+ Upload source</button>
      </div>
      <div class="field">
        <label>Extra videos — YouTube URL, direct video, or GIF</label>
        <div class="videos-list" id="videosList">${videosHtml}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addVideo()">+ Add video</button>
      </div>
      <div class="field">
        <label>Clips — mark your contributions as hover-to-play segments</label>
        <div class="clips-list" id="clipsList">${(p.clips || []).map((c, ci) => clipRowHtml(c, ci)).join('')}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addClip()">+ Add clip</button>
        <button class="btn btn-sm btn-save-extract" id="processClipsBtn" onclick="processClips()">💾 Save &amp; extract clips</button>
        <div class="clip-hint">Hit ⏱ to set times, then click Save &amp; extract — the runner trims the uploaded Source video and embeds each clip as a local mp4. Progress shows in the bottom-right corner — safe to switch projects while it runs.</div>
      </div>
    </div>

    <!-- THUMBNAIL -->
    <div class="section">
      <div class="section-title">Thumbnail</div>
      <div class="thumb-preview-row">
        ${thumbPreview}
        <div class="thumb-preview-info">
          <div class="thumb-path-display ${isUrl ? 'is-url' : ''}" id="thumbPathDisplay">${thumbSrc || '— none —'}</div>
          <div class="field" style="margin-bottom:6px">
            <label>Paste a URL</label>
            <input type="text" id="thumbUrlInput" value="${isUrl ? esc(thumbSrc) : ''}" placeholder="https://img.youtube.com/vi/.../mqdefault.jpg" oninput="applyThumbUrl(this.value)">
          </div>
          <span class="thumb-grid-toggle" onclick="toggleThumbGrid()">
            ${thumbGridVisible ? 'Hide image picker ↑' : 'Browse local images ↓'}
          </span>
        </div>
      </div>
      <div class="upload-zone" id="uploadZone"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleUploadDrop(event)">
        <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" onchange="handleUploadFile(this.files[0])">
        <div class="upload-zone-label">
          <strong>Upload a new image</strong> — drag &amp; drop or click to browse
        </div>
        <div class="upload-progress" id="uploadProgress">Uploading…</div>
      </div>
      ${thumbGridVisible ? renderThumbGrid(thumbSrc) : ''}
    </div>

    <!-- CREDITS -->
    <div class="section">
      <div class="section-title">Credits</div>
      <div class="credits-list" id="creditsList">${creditsHtml}</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="addCredit()">+ Add credit row</button>
    </div>

    <!-- DELETE -->
    <div class="section">
      <div class="section-title">Danger Zone</div>
      <div class="danger-zone">
        <p>This will permanently remove the project from the portfolio. You'll need to save after deleting.</p>
        <button class="btn btn-danger btn-sm" onclick="deleteProject()">Delete "${esc(p.title || 'this project')}"</button>
      </div>
    </div>
  `;

  // If a clip extraction is currently running, keep the new button disabled too
  if (typeof _extractInFlight !== 'undefined' && _extractInFlight) {
    const b = document.getElementById('processClipsBtn');
    if (b) b.disabled = true;
  }
}

function renderThumbGrid(currentThumb) {
  const opts = thumbFiles.map(file => {
    const path = `assets/thumbs/${file}`;
    const sel = currentThumb === path;
    return `<div class="thumb-opt ${sel ? 'selected' : ''}" onclick="pickThumb('${path}')">
      <img src="${path}" loading="lazy" alt="${file}">
      <div class="thumb-opt-label">${file}</div>
    </div>`;
  }).join('');
  return `<div class="thumb-grid-wrap"><div class="thumb-grid">${opts}</div></div>`;
}

function creditRowHtml([key, val], ci) {
  return `<div class="credit-row" id="credit-${ci}">
    <input type="text" value="${esc(key)}" placeholder="Role" style="flex:0.8" oninput="updateCredit(${ci}, 0, this.value)">
    <input type="text" value="${esc(val)}" placeholder="Name / detail" oninput="updateCredit(${ci}, 1, this.value)">
    <button class="credit-remove" onclick="removeCredit(${ci})">×</button>
  </div>`;
}

function videoRowHtml(url, vi) {
  return `<div class="video-row" id="video-${vi}">
    <input type="text" value="${esc(url)}" placeholder="https://youtu.be/… or upload ↓" oninput="updateVideo(${vi}, this.value)">
    <button class="btn btn-ghost btn-sm video-upload-btn" onclick="pickVideoFile(${vi})" title="Upload video or GIF">↑ Upload</button>
    <button class="credit-remove" onclick="removeVideo(${vi})">×</button>
  </div>`;
}

// Returns the project's source list, supporting both the legacy single
// `sourceVideo` and the newer `sourceVideos` array. Always returns an array.
function getAllSources(p) {
  if (Array.isArray(p.sourceVideos) && p.sourceVideos.length) return p.sourceVideos.filter(Boolean);
  if (p.sourceVideo) return [p.sourceVideo];
  return [];
}

function sourcesHtml(p) {
  const sources = getAllSources(p);
  if (!sources.length) {
    return `<div style="font-size:11px;color:var(--dim);padding:4px 0">No sources yet — upload one below.</div>`;
  }
  return sources.map((src, si) => `
    <div class="video-row" id="source-${si}">
      <input type="text" value="${esc(src)}" placeholder="assets/sources/project.mp4" oninput="updateSource(${si}, this.value)">
      <button class="credit-remove" onclick="removeSource(${si})" title="Remove this source">×</button>
    </div>`).join('');
}

function clipRowHtml(clip, ci) {
  const extracted = !!clip.clipFile;
  const statusCls = extracted ? 'ok' : 'missing';
  const statusTxt = extracted ? '✓ Extracted' : '○ Not extracted';
  const project = data.projects[selectedIdx];
  const sources = project ? getAllSources(project) : [];
  // Per-clip source picker — only render when there are 2+ sources.
  const sourcePicker = sources.length > 1 ? `
    <select class="clip-source" oninput="updateClip(${ci}, 'sourceVideo', this.value)" title="Pick which source to extract this clip from">
      ${sources.map((s, si) => {
        const fname = s.split('/').pop() || s;
        const sel = ((!clip.sourceVideo && si === 0) || clip.sourceVideo === s) ? 'selected' : '';
        return `<option value="${esc(s)}" ${sel}>${esc(fname)}</option>`;
      }).join('')}
    </select>` : '';
  return `<div class="clip-row" id="clip-${ci}">
    <input class="clip-label" type="text" value="${esc(clip.label || '')}" placeholder="Label (e.g. Direction)" oninput="updateClip(${ci}, 'label', this.value)">
    <input class="clip-time" type="text" value="${esc(clip.start || '')}" placeholder="Start" oninput="updateClip(${ci}, 'start', this.value)" id="clip-start-${ci}">
    <input class="clip-time" type="text" value="${esc(clip.end || '')}" placeholder="End" oninput="updateClip(${ci}, 'end', this.value)" id="clip-end-${ci}">
    ${sourcePicker}
    <span class="field-status ${statusCls}" id="clip-status-${ci}" title="${extracted ? esc(clip.clipFile) : 'Run Save & extract to generate'}">${statusTxt}</span>
    <button class="btn btn-ghost btn-sm clip-scrub-btn" id="clip-scrub-btn-${ci}" onclick="toggleClipPreview(${ci})" title="Scrub video to set times">⏱</button>
    <button class="credit-remove" onclick="removeClip(${ci})">×</button>
  </div>`;
}

function updateSource(si, value) {
  const p = data.projects[selectedIdx];
  if (!Array.isArray(p.sourceVideos)) p.sourceVideos = getAllSources(p);
  p.sourceVideos[si] = value;
  // Keep legacy field synced to first source for backward compat
  p.sourceVideo = p.sourceVideos[0] || '';
  markDirty();
  refreshSourcesStatus();
}

function removeSource(si) {
  const p = data.projects[selectedIdx];
  if (!Array.isArray(p.sourceVideos)) p.sourceVideos = getAllSources(p);
  p.sourceVideos.splice(si, 1);
  p.sourceVideo = p.sourceVideos[0] || '';
  // Drop any clip.sourceVideo that pointed at the removed file (will fall back to default)
  (p.clips || []).forEach(c => {
    if (c.sourceVideo && !p.sourceVideos.includes(c.sourceVideo)) delete c.sourceVideo;
  });
  markDirty();
  renderEditor(); // Re-render so list + clip pickers update
}

function refreshSourcesStatus() {
  const p = data.projects[selectedIdx];
  const sources = getAllSources(p);
  const el = document.getElementById('sourceVideoStatus');
  if (!el) return;
  if (sources.length) {
    el.classList.remove('missing'); el.classList.add('ok');
    el.textContent = `✓ ${sources.length} uploaded`;
  } else {
    el.classList.remove('ok'); el.classList.add('missing');
    el.textContent = '○ Not uploaded';
  }
}

// ── FIELD UPDATES ──────────────────────────────────────────

function markDirty() {
  dirty.add(selectedIdx);
  // Update sidebar item style without full re-render
  document.querySelectorAll('.project-item').forEach(el => {
    const i = parseInt(el.dataset.idx);
    if (dirty.has(i)) el.classList.add('dirty');
  });
}

function update(key, value) {
  data.projects[selectedIdx][key] = value;
  markDirty();
  // Update sidebar title live
  if (key === 'title') {
    const items = document.querySelectorAll('.project-item');
    items.forEach(el => {
      if (parseInt(el.dataset.idx) === selectedIdx) {
        const t = el.querySelector('.item-title');
        if (t) t.textContent = value || 'Untitled';
      }
    });
    document.querySelector('h2') && (document.querySelector('h2').textContent = value || 'Untitled');
  }
}

function toggleTag(tag, checked) {
  const p = data.projects[selectedIdx];
  if (!p.tags) p.tags = [];
  if (checked) { if (!p.tags.includes(tag)) p.tags.push(tag); }
  else { p.tags = p.tags.filter(t => t !== tag); }
  // Keep category in sync: use first matching category tag, fallback to current
  const catTag = p.tags.find(t => CATEGORIES.includes(t));
  if (catTag) p.category = catTag;
  markDirty();
  // Re-render tags row so active state updates visually
  const tagsRow = document.querySelector('.tags-row');
  if (tagsRow) {
    tagsRow.innerHTML = ALL_TAGS.map(t => {
      const active = (p.tags || []).includes(t);
      return `<label class="tag-chip ${active ? 'active' : ''}">
        <input type="checkbox" ${active ? 'checked' : ''} onchange="toggleTag('${t}', this.checked)"> ${t}
      </label>`;
    }).join('');
  }
}

function applyThumbUrl(val) {
  data.projects[selectedIdx].thumb = val;
  markDirty();
  updateThumbPreview(val);
}

function pickThumb(path) {
  data.projects[selectedIdx].thumb = path;
  markDirty();
  updateThumbPreview(path);
  // Update grid selection
  document.querySelectorAll('.thumb-opt').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('onclick').includes(`'${path}'`));
  });
  // Update path display
  const disp = document.querySelector('.thumb-path-display');
  if (disp) { disp.textContent = path; disp.classList.remove('is-url'); }
  // Clear URL input
  const urlInput = document.getElementById('thumbUrlInput');
  if (urlInput) urlInput.value = '';
}

function updateThumbPreview(src) {
  const previewRow = document.querySelector('.thumb-preview-row');
  if (!previewRow) return;
  const existing = previewRow.querySelector('img, .thumb-preview-placeholder');
  if (!existing) return;
  if (src) {
    const img = document.createElement('img');
    img.className = 'thumb-preview';
    img.src = src;
    img.alt = '';
    img.onerror = () => { img.outerHTML = '<div class="thumb-preview-placeholder">broken link</div>'; };
    existing.replaceWith(img);
  }
  const disp = document.querySelector('.thumb-path-display');
  if (disp) {
    disp.textContent = src || '— none —';
    disp.classList.toggle('is-url', src.startsWith('http'));
  }
}

function toggleThumbGrid() {
  thumbGridVisible = !thumbGridVisible;
  renderEditor();
}

function updateCredit(ci, col, val) {
  if (!data.projects[selectedIdx].credits) data.projects[selectedIdx].credits = [];
  if (!data.projects[selectedIdx].credits[ci]) data.projects[selectedIdx].credits[ci] = ['', ''];
  data.projects[selectedIdx].credits[ci][col] = val;
  markDirty();
}

function addCredit() {
  const p = data.projects[selectedIdx];
  if (!p.credits) p.credits = [];
  p.credits.push(['', '']);
  markDirty();
  const list = document.getElementById('creditsList');
  if (list) {
    const ci = p.credits.length - 1;
    const div = document.createElement('div');
    div.innerHTML = creditRowHtml(['', ''], ci);
    list.appendChild(div.firstElementChild);
  }
}

function removeCredit(ci) {
  data.projects[selectedIdx].credits.splice(ci, 1);
  markDirty();
  renderEditor();
}

function updateVideo(vi, val) {
  if (!data.projects[selectedIdx].videos) data.projects[selectedIdx].videos = [];
  data.projects[selectedIdx].videos[vi] = val;
  markDirty();
}

function addVideo() {
  const p = data.projects[selectedIdx];
  if (!p.videos) p.videos = [];
  p.videos.push('');
  markDirty();
  const list = document.getElementById('videosList');
  if (list) {
    const vi = p.videos.length - 1;
    const div = document.createElement('div');
    div.innerHTML = videoRowHtml('', vi);
    list.appendChild(div.firstElementChild);
  }
}

function removeVideo(vi) {
  data.projects[selectedIdx].videos.splice(vi, 1);
  if (data.projects[selectedIdx].videos.length === 0) delete data.projects[selectedIdx].videos;
  markDirty();
  renderEditor();
}

function updateClip(ci, field, val) {
  const p = data.projects[selectedIdx];
  if (!p.clips) p.clips = [];
  if (!p.clips[ci]) p.clips[ci] = { label: '', start: '', end: '' };
  p.clips[ci][field] = val;
  markDirty();
}

function addClip() {
  const p = data.projects[selectedIdx];
  if (!p.clips) p.clips = [];
  p.clips.push({ label: '', start: '', end: '' });
  markDirty();
  const list = document.getElementById('clipsList');
  if (list) {
    const ci = p.clips.length - 1;
    const div = document.createElement('div');
    div.innerHTML = clipRowHtml({ label: '', start: '', end: '' }, ci);
    list.appendChild(div.firstElementChild);
  }
}

// ── SAVE & EXTRACT CLIPS ──────────────────────────────────
// Saves the current data, then triggers the GitHub Actions workflow that
// trims the uploaded Source video into local mp4 clips. Progress is shown
// in a persistent toast (bottom-right) so it survives switching projects.

let _extractInFlight = false;
let _uploadInFlight  = false;

// Generic stackable toast — used by Save & extract and Source upload.
// Returns { setProgress(pct, label, state), setTitle(text), allowDismiss(), close() }.
function ensureToastStack() {
  let stack = document.getElementById('opToastStack');
  if (!stack) {
    stack = document.createElement('div');
    stack.id = 'opToastStack';
    stack.className = 'op-toast-stack';
    document.body.appendChild(stack);
  }
  return stack;
}

function makeOpToast(id, initialTitle) {
  const stack = ensureToastStack();
  let toast = document.getElementById(id);
  if (!toast) {
    toast = document.createElement('div');
    toast.id = id;
    toast.className = 'op-toast';
    toast.innerHTML = `
      <div class="op-title">
        <span class="op-title-text"></span>
        <button class="op-close" title="Dismiss" style="display:none">×</button>
      </div>
      <div class="op-track"><div class="op-fill"></div></div>
      <div class="op-label"></div>`;
    stack.appendChild(toast);
  }
  const fill   = toast.querySelector('.op-fill');
  const label  = toast.querySelector('.op-label');
  const title  = toast.querySelector('.op-title-text');
  const close  = toast.querySelector('.op-close');
  close.onclick = () => toast.classList.remove('visible');
  title.textContent = initialTitle;
  close.style.display = 'none';
  fill.style.width = '0%';
  fill.classList.remove('success','error');
  label.textContent = '';
  toast.classList.add('visible');
  return {
    setProgress(pct, lbl, state) {
      fill.style.width = Math.max(0, Math.min(100, pct)) + '%';
      fill.classList.toggle('success', state === 'success');
      fill.classList.toggle('error',   state === 'error');
      label.innerHTML = lbl;
    },
    setTitle(t) { title.textContent = t; },
    allowDismiss() { close.style.display = ''; },
    close() { toast.classList.remove('visible'); }
  };
}

async function processClips() {
  if (_extractInFlight) {
    alert('A clip extraction is already running. Wait for it to finish, or dismiss the progress card first.');
    return;
  }
  const p = data.projects[selectedIdx];
  const token = getGhToken();

  if (!token)              { alert('Set your GitHub token (🔑 Token) first.'); return; }
  if (!p.sourceVideo)      { alert('Upload a Source video for this project first (above the Clips section).'); return; }
  if (!p.clips || !p.clips.length) { alert('Add at least one clip with start/end times first.'); return; }
  const invalid = p.clips.filter(c => !c.start || !c.end);
  if (invalid.length) { alert(`${invalid.length} clip(s) missing start/end. Set times first.`); return; }

  const toast = makeOpToast('extractToast', `Extracting: ${p.title}`);
  const setProgress = (pct, label, state) => toast.setProgress(pct, label, state);

  // Disable the in-flight project's button if it's currently rendered
  const btnNow = () => document.getElementById('processClipsBtn');
  const updateBtn = (disabled) => { const b = btnNow(); if (b) b.disabled = disabled; };

  _extractInFlight = true;
  updateBtn(true);
  try {
    // 1) Save current data first (so any time-code edits aren't lost on conflict)
    setProgress(2, 'Saving project…', '');
    await saveAll();

    // 2) Dispatch workflow
    setProgress(5, 'Queuing workflow…', '');
    const GH_HEADERS = {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };
    // Send sources array; each clip can pick which source via clip.sourceVideo.
    // Workflow falls back to first source when clip.sourceVideo is unset.
    const sources = getAllSources(p);
    const dispatchRes = await fetch('https://api.github.com/repos/chowpeijunn/portfolio/dispatches', {
      method: 'POST',
      headers: GH_HEADERS,
      body: JSON.stringify({
        event_type: 'process-clips',
        client_payload: {
          project_title: p.title,
          sources: sources,
          source_video: sources[0] || '',  // legacy default for older workflow runs
          clips: p.clips
        }
      })
    });
    if (dispatchRes.status !== 204) {
      const j = await dispatchRes.json().catch(() => ({}));
      throw new Error(j.message || `HTTP ${dispatchRes.status}`);
    }

    setProgress(8, 'Workflow queued — waiting for runner…', '');
    await new Promise(r => setTimeout(r, 6000));

    // 3) Poll for the run
    const POLL_URL = 'https://api.github.com/repos/chowpeijunn/portfolio/actions/workflows/process-clips.yml/runs?event=repository_dispatch&per_page=1';
    const STEP_MAP = [
      { pattern: /install ffmpeg/i, pct: 30, label: 'Installing ffmpeg…' },
      { pattern: /trim clips/i,     pct: 70, label: 'Trimming clips from source…' },
      { pattern: /commit/i,         pct: 90, label: 'Committing clip files…' }
    ];

    const startedAt = Date.now();
    const TIMEOUT_MS = 5 * 60 * 1000;
    let done = false;
    let runId = null;

    while (!done && Date.now() - startedAt < TIMEOUT_MS) {
      await new Promise(r => setTimeout(r, 5000));

      let run;
      try {
        const res = await fetch(POLL_URL, { headers: GH_HEADERS });
        const j = await res.json();
        run = j.workflow_runs && j.workflow_runs[0];
      } catch { continue; }
      if (!run) { setProgress(8, 'Waiting for runner…', ''); continue; }
      runId = run.id;

      if (run.status === 'queued')      { setProgress(12, 'Runner queued…', ''); continue; }
      if (run.status === 'in_progress') {
        let job;
        try {
          const jr = await fetch(run.jobs_url, { headers: GH_HEADERS });
          job = (await jr.json()).jobs?.[0];
        } catch { setProgress(20, 'Running…', ''); continue; }
        let bestPct = 20, bestLabel = 'Running…';
        for (const step of (job?.steps || [])) {
          if (step.status === 'in_progress' || step.status === 'completed') {
            for (const m of STEP_MAP) {
              if (m.pattern.test(step.name) && m.pct > bestPct) {
                bestPct = m.pct; bestLabel = m.label;
              }
            }
          }
        }
        setProgress(bestPct, bestLabel, '');
        continue;
      }
      if (run.status === 'completed') {
        if (run.conclusion === 'success') {
          setProgress(100, '✓ Clips embedded! Reload the public site to see them.', 'success');
        } else {
          const url = `https://github.com/chowpeijunn/portfolio/actions/runs/${runId}`;
          setProgress(100, `Workflow ${run.conclusion}. <a href="${url}" target="_blank">Check logs ↗</a>`, 'error');
        }
        done = true;
      }
    }
    if (!done) setProgress(95, 'Taking longer than expected — check GitHub Actions tab.', '');
  } catch (e) {
    setProgress(100, 'Error: ' + e.message, 'error');
  } finally {
    _extractInFlight = false;
    updateBtn(false);
    toast.allowDismiss();
  }
}

var _ytApiReady = false;
var _ytPending = [];
function onYouTubeIframeAPIReady() {
  _ytApiReady = true;
  _ytPending.forEach(fn => fn());
  _ytPending = [];
}
function loadYTApi() {
  if (document.getElementById('yt-iframe-api')) return;
  const s = document.createElement('script');
  s.id = 'yt-iframe-api';
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

var _clipPlayers = {};   // ci → YT.Player
var _clipTimers  = {};   // ci → setInterval id

function getYtVideoId(url) {
  if (!url) return '';
  if (url.includes('youtu.be/')) return url.split('youtu.be/')[1].split('?')[0];
  if (url.includes('watch?v='))  return url.split('watch?v=')[1].split('&')[0];
  if (url.includes('/shorts/'))  return url.split('/shorts/')[1].split('?')[0];
  return '';
}

function fmtTime(secs) {
  const s = Math.floor(secs);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

function parseClipTime(val) {
  if (!val) return 0;
  const parts = String(val).split(':').map(Number);
  return parts.length === 2 ? parts[0] * 60 + parts[1] : (parseInt(val) || 0);
}

function closeClipPreview(ci) {
  clearInterval(_clipTimers[ci]);
  delete _clipTimers[ci];
  if (_clipPlayers[ci]) { try { _clipPlayers[ci].destroy(); } catch(e){} delete _clipPlayers[ci]; }
  const el = document.getElementById(`clip-preview-${ci}`);
  if (el) el.remove();
  const btn = document.getElementById(`clip-scrub-btn-${ci}`);
  if (btn) btn.classList.remove('active');
}

function toggleClipPreview(ci) {
  if (document.getElementById(`clip-preview-${ci}`)) { closeClipPreview(ci); return; }

  const p = data.projects[selectedIdx];
  const ytId = getYtVideoId(p.video || '');
  if (!ytId) { alert('Set a YouTube video URL for this project first.'); return; }

  const btn = document.getElementById(`clip-scrub-btn-${ci}`);
  if (btn) btn.classList.add('active');

  const row = document.getElementById(`clip-${ci}`);
  const preview = document.createElement('div');
  preview.id = `clip-preview-${ci}`;
  preview.className = 'clip-preview';
  preview.innerHTML = `
    <div class="clip-player-wrap"><div id="clip-yt-${ci}"></div></div>
    <div class="clip-controls">
      <span class="clip-current-time" id="clip-time-${ci}">0:00</span>
      <button class="btn btn-ghost btn-sm" onclick="setClipTime(${ci},'start')">Set Start</button>
      <button class="btn btn-ghost btn-sm" onclick="setClipTime(${ci},'end')">Set End</button>
    </div>
    <div class="clip-range-bar">
      <div class="clip-range-track"></div>
      <div class="clip-range-fill" id="clip-range-fill-${ci}"></div>
    </div>`;
  row.insertAdjacentElement('afterend', preview);

  loadYTApi();
  function createPlayer() {
    _clipPlayers[ci] = new YT.Player(`clip-yt-${ci}`, {
      videoId: ytId,
      playerVars: { controls: 1, rel: 0, modestbranding: 1, iv_load_policy: 3 },
      events: {
        onReady: () => {
          _clipTimers[ci] = setInterval(() => {
            if (!document.getElementById(`clip-preview-${ci}`)) { closeClipPreview(ci); return; }
            const player = _clipPlayers[ci];
            if (!player || typeof player.getCurrentTime !== 'function') return;
            const t   = player.getCurrentTime() || 0;
            const dur = player.getDuration()    || 0;
            const timeEl = document.getElementById(`clip-time-${ci}`);
            if (timeEl) timeEl.textContent = fmtTime(t);
            if (dur > 0) updateClipRangeBar(ci, dur);
          }, 200);
        }
      }
    });
  }
  if (_ytApiReady) createPlayer(); else _ytPending.push(createPlayer);
}

function setClipTime(ci, field) {
  const player = _clipPlayers[ci];
  if (!player || typeof player.getCurrentTime !== 'function') return;
  const t = fmtTime(player.getCurrentTime());
  updateClip(ci, field, t);
  const input = document.getElementById(field === 'start' ? `clip-start-${ci}` : `clip-end-${ci}`);
  if (input) input.value = t;
  const dur = player.getDuration() || 0;
  if (dur > 0) updateClipRangeBar(ci, dur);
}

function updateClipRangeBar(ci, dur) {
  const fill = document.getElementById(`clip-range-fill-${ci}`);
  if (!fill) return;
  const p = data.projects[selectedIdx];
  const clip = (p.clips || [])[ci] || {};
  const start = parseClipTime(clip.start);
  const end   = parseClipTime(clip.end);
  fill.style.left  = (start / dur * 100) + '%';
  fill.style.width = (Math.max(0, (end - start) / dur) * 100) + '%';
}

// Lazy-load ffmpeg.wasm and cache the instance
let _ffmpegPromise = null;
async function getFFmpeg(onLog) {
  if (_ffmpegPromise) return _ffmpegPromise;
  _ffmpegPromise = (async () => {
    const FFMPEG_VERSION = '0.12.10';
    const UTIL_VERSION   = '0.12.1';
    const CORE_VERSION   = '0.12.6';
    if (onLog) onLog('Loading compressor (~30 MB, one-time download)…');
    const ffmpegBase = `https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@${FFMPEG_VERSION}/dist/esm`;
    const utilBase   = `https://cdn.jsdelivr.net/npm/@ffmpeg/util@${UTIL_VERSION}/dist/esm`;
    const coreBase   = `https://cdn.jsdelivr.net/npm/@ffmpeg/core@${CORE_VERSION}/dist/umd`;
    const { FFmpeg }               = await import(`${ffmpegBase}/index.js`);
    const { fetchFile, toBlobURL } = await import(`${utilBase}/index.js`);
    // Fetch worker + core scripts as same-origin blob URLs to avoid cross-origin
    // Worker construction errors. Without classWorkerURL the FFmpeg class spawns
    // a Worker with the CDN URL directly, which browsers block.
    const [classWorkerURL, coreURL, wasmURL] = await Promise.all([
      toBlobURL(`${ffmpegBase}/worker.js`,        'text/javascript'),
      toBlobURL(`${coreBase}/ffmpeg-core.js`,     'text/javascript'),
      toBlobURL(`${coreBase}/ffmpeg-core.wasm`,   'application/wasm'),
    ]);
    const ffmpeg = new FFmpeg();
    await ffmpeg.load({ classWorkerURL, coreURL, wasmURL });
    return { ffmpeg, fetchFile };
  })();
  return _ffmpegPromise;
}

// Compress any-size video to a 720p, audio-stripped mp4 ready for the workflow.
async function compressVideoInBrowser(file, onProgress) {
  const { ffmpeg, fetchFile } = await getFFmpeg(msg => onProgress(0, msg));
  // Reset listeners (re-running on the same instance otherwise stacks them)
  ffmpeg.off?.('progress');
  ffmpeg.on('progress', ({ progress }) => {
    const pct = Math.max(0, Math.min(100, Math.round((progress || 0) * 100)));
    onProgress(pct, `Compressing… ${pct}%`);
  });

  const ext = (file.name.match(/\.[^.]+$/) || ['.mp4'])[0];
  const inputName = `input${ext}`;
  const outputName = 'output.mp4';

  onProgress(0, 'Preparing file…');
  await ffmpeg.writeFile(inputName, await fetchFile(file));

  onProgress(0, 'Compressing… 0%');
  await ffmpeg.exec([
    '-i', inputName,
    '-c:v', 'libx264', '-crf', '26', '-preset', 'medium',
    '-pix_fmt', 'yuv420p', '-vf', 'scale=-2:min(720\\,ih)',
    '-an', '-movflags', '+faststart',
    outputName
  ]);

  const data = await ffmpeg.readFile(outputName);
  // Free wasm memory
  try { await ffmpeg.deleteFile(inputName); } catch {}
  try { await ffmpeg.deleteFile(outputName); } catch {}
  return new Blob([data.buffer], { type: 'video/mp4' });
}

function refreshFieldStatus(elId, value) {

async function pickSourceVideo() {
  if (_uploadInFlight) {
    alert('A source upload is already running. Wait for it to finish or dismiss the progress card first.');
    return;
  }
  // Capture which project is being uploaded to — selectedIdx may change later.
  const projectIdxAtStart = selectedIdx;
  const projectAtStart    = data.projects[projectIdxAtStart];
  const projectTitleAtStart = projectAtStart?.title || 'project';

  const picker = document.createElement('input');
  picker.type = 'file';
  picker.accept = 'video/mp4,video/*';
  picker.onchange = async () => {
    const file = picker.files[0];
    if (!file) return;

    const HARD_MAX_MB   = 1024;  // Above this, the browser tab will likely OOM
    const UPLOAD_MAX_MB = 80;    // GitHub API hard ceiling is 100; 80 leaves margin

    if (file.size > HARD_MAX_MB * 1024 * 1024) {
      alert(`File is ${(file.size/1024/1024).toFixed(0)} MB — too large for browser-based compression (max ${HARD_MAX_MB} MB). Trim or pre-compress in your video editor and try again.`);
      return;
    }

    _uploadInFlight = true;
    const toast = makeOpToast('uploadToast', `Uploading source: ${projectTitleAtStart}`);
    const setSrcProgress = (pct, label, state) => toast.setProgress(pct, label, state);

    let uploadFile = file;
    const origMb = (file.size / 1024 / 1024).toFixed(0);

    try {
      // Compression covers 0→90% of the bar; upload covers 90→100%.
      if (file.size > UPLOAD_MAX_MB * 1024 * 1024 || /\.(mov|avi|mkv|wmv)$/i.test(file.name) || file.size > 20 * 1024 * 1024) {
        const compressed = await compressVideoInBrowser(file, (pct, label) => {
          setSrcProgress(pct * 0.9, `${origMb} MB → ${label}`, '');
        });
        const compMb = (compressed.size / 1024 / 1024).toFixed(1);
        if (compressed.size > UPLOAD_MAX_MB * 1024 * 1024) {
          setSrcProgress(100, `Compressed file still ${compMb} MB (max ${UPLOAD_MAX_MB} MB) — trim shorter`, 'error');
          alert(`Even after compression the file is ${compMb} MB (max ${UPLOAD_MAX_MB} MB). Source is probably very long — trim it shorter and try again.`);
          return;
        }
        uploadFile = new File([compressed], sanitizeFilename(file.name.replace(/\.[^.]+$/i, '') + '.mp4'), { type: 'video/mp4' });
        setSrcProgress(90, `Compressed ${origMb} MB → ${compMb} MB. Uploading…`, '');
      } else {
        setSrcProgress(20, `Uploading ${origMb} MB…`, '');
      }
    } catch (err) {
      setSrcProgress(100, 'Compression failed', 'error');
      toast.allowDismiss();
      _uploadInFlight = false;
      alert('Compression failed: ' + (err.message || err) + '\n\nIf the file is very long or huge, try trimming it first.');
      return;
    }

    try {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(uploadFile);
      });
      const safeName = sanitizeFilename(uploadFile.name);
      const uploadPath = await githubPut(`assets/sources/${safeName}`, base64, uploadFile.name);
      // Append to the project's sourceVideos array (creating it from legacy single field if needed).
      // The card hover preview reads sourceVideos[0] directly — no separate preview field needed.
      if (projectAtStart) {
        if (!Array.isArray(projectAtStart.sourceVideos)) {
          projectAtStart.sourceVideos = projectAtStart.sourceVideo ? [projectAtStart.sourceVideo] : [];
        }
        // Avoid duplicates
        if (!projectAtStart.sourceVideos.includes(uploadPath)) {
          projectAtStart.sourceVideos.push(uploadPath);
        }
        // Keep legacy field synced to the first source for backward compat
        projectAtStart.sourceVideo = projectAtStart.sourceVideos[0];
      }
      // If still viewing the same project, re-render the editor so the new
      // source appears in the list and the per-clip pickers update.
      if (selectedIdx === projectIdxAtStart) {
        renderEditor();
      }
      markDirty();
      // Auto-save so the sourceVideo path is in data.json before processClips runs
      setSrcProgress(98, 'Saving…', '');
      await saveAll().catch(() => {});
      setSrcProgress(100, `✓ Uploaded & saved ${(uploadFile.size/1024/1024).toFixed(1)} MB`, 'success');
    } catch (err) {
      setSrcProgress(100, 'Upload failed', 'error');
      alert('Upload failed: ' + err.message);
    } finally {
      toast.allowDismiss();
      _uploadInFlight = false;
    }
  };
  picker.click();
}

let gridCols = 5;
let gridOrder = []; // flat array of ALL project indices
let hubIdx = 0;     // hub is visually inserted before gridOrder[hubIdx]
let gridDragSrc = null;

function openGridView() {

// Centre hubIdx so the hub lands in the middle column for the current gridCols.
// Even cols (2,4): hub spans 2 → target col-start = floor((cols-1)/2) from 0-based row start
// Odd cols (3,5):  hub is 1-wide → same formula gives the centre column index
function centerHubForCols() {
  // Target column-start (0-based within its row) so hub is centred:
  // 2→0 (span 2 fills row), 3→1 (col 2 of 3), 4→1 (span 2 at cols 2-3), 5→2 (col 3 of 5)
  const targetMod = Math.floor((gridCols - 1) / 2);
  const base = Math.round(gridOrder.length / 2);
  const currentMod = base % gridCols;
  let diff = ((targetMod - currentMod) % gridCols + gridCols) % gridCols;
  if (diff > Math.floor(gridCols / 2)) diff -= gridCols; // pick nearest direction
  hubIdx = Math.max(0, Math.min(gridOrder.length, base + diff));
}

function setGridCols(n) {
  gridCols = n;
  centerHubForCols(); // re-centre when switching column count
  renderGridBoard();
  // highlight active col btn
  document.querySelectorAll('.col-btn').forEach(b => {
    b.style.background = parseInt(b.textContent) === n ? 'var(--accent)' : '';
    b.style.color = parseInt(b.textContent) === n ? '#fff' : '';
  });
}

function renderGridBoard() {
  const board = document.getElementById('gridBoard');
  board.style.gridTemplateColumns = `repeat(${gridCols}, 1fr)`;
  board.style.gridAutoFlow = 'row';
  board.innerHTML = '';

  // Render all items in order, inserting hub at hubIdx
  const total = gridOrder.length; // excludes hub
  for (let slot = 0; slot <= total; slot++) {
    // Insert hub at its fixed position
    if (slot === hubIdx) {
      const hub = document.createElement('div');
      hub.className = 'gc gc-hub';

      if (gridCols === 2) {
        // Full row — hub fills both columns
        hub.style.gridColumn = 'span 2';
        hub.innerHTML = `<div class="gc-hub-inner">
          <div class="gc-hub-name">Chow Pei Jun</div>
          <div class="gc-hub-sub">hub card</div>
        </div>`;
      } else if (gridCols === 4) {
        // Spans 2 cols but the visible card is 1-col wide, centred inside
        hub.style.gridColumn = 'span 2';
        hub.style.background = 'transparent';
        hub.style.border = 'none';
        hub.style.overflow = 'visible';
        hub.style.display = 'flex';
        hub.style.alignItems = 'flex-start';
        hub.style.justifyContent = 'center';
        hub.innerHTML = `<div class="gc-hub-inner-single">
          <div class="gc-hub-name">Chow Pei Jun</div>
          <div class="gc-hub-sub">hub card</div>
        </div>`;
      } else {
        // 3 or 5 cols — 1 card wide, centred column via hubIdx
        hub.innerHTML = `<div class="gc-hub-inner">
          <div class="gc-hub-name">Chow Pei Jun</div>
          <div class="gc-hub-sub">hub card</div>
        </div>`;
      }
      // Allow dropping onto hub to place card just before/after it
      hub.addEventListener('dragover', (e) => { e.preventDefault(); hub.style.borderColor = 'var(--accent)'; });
      hub.addEventListener('dragleave', () => { hub.style.borderColor = ''; });
      hub.addEventListener('drop', (e) => {
        e.preventDefault();
        hub.style.borderColor = '';
        if (gridDragSrc === null) return;
        const [item] = gridOrder.splice(gridDragSrc, 1);
        // Insert as first after-hub card. After removing, hub's effective
        // boundary shifts by -1 if src was before hub.
        const insertAt = gridDragSrc < hubIdx ? hubIdx - 1 : hubIdx;
        gridOrder.splice(Math.max(0, insertAt), 0, item);
        // hubIdx never changes — hub stays fixed
        gridDragSrc = null;
        renderGridBoard();
      });
      board.appendChild(hub);
    }

    if (slot === total) break;

    const orderIdx = slot;
    const projIdx = gridOrder[orderIdx];
    const p = data.projects[projIdx];
    const card = document.createElement('div');
    card.className = 'gc';
    card.draggable = true;
    // col=1: all project cards are half-width (natural 2-col flow), only hub spans full width

    const thumb = p.thumb || '';
    card.innerHTML = `
      ${thumb
        ? `<img src="${thumb}" alt="" draggable="false">`
        : `<div class="gc-no-thumb">no thumbnail</div>`}
      <div class="gc-num">${orderIdx + 1}</div>
      <div class="gc-label">
        <div class="gc-label-title">${esc(p.title || 'Untitled')}</div>
        <div class="gc-label-cat">${orderIdx < hubIdx ? '↑ before' : '↓ after'}</div>
      </div>`;

    card.addEventListener('dragstart', (e) => {
      gridDragSrc = orderIdx;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => card.classList.add('gc-dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('gc-dragging');
      document.querySelectorAll('.gc-drag-over').forEach(el =>
        el.classList.remove('gc-drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (gridDragSrc === null || gridDragSrc === orderIdx) return;
      card.classList.add('gc-drag-over');
    });
    card.addEventListener('dragleave', () =>
      card.classList.remove('gc-drag-over'));
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('gc-drag-over');
      if (gridDragSrc === null || gridDragSrc === orderIdx) return;
      // Swap the two cards
      const tmp = gridOrder[gridDragSrc];
      gridOrder[gridDragSrc] = gridOrder[orderIdx];
      gridOrder[orderIdx] = tmp;
      gridDragSrc = null;
      renderGridBoard();
    });

    board.appendChild(card);
  }

  // No end-zone needed — drag-to-swap means every card is a valid drop target
}

// ── UPLOAD ────────────────────────────────────────────────

function handleUploadDrop(e) {
  e.preventDefault();
  const zone = document.getElementById('uploadZone');
  if (zone) zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleUploadFile(file);
}

// Resize + JPEG-compress an image File via Canvas before upload.
// Keeps GIFs as-is (canvas would break animation).
function compressImage(file, maxWidth = 1600, quality = 0.85) {
  return new Promise((resolve) => {
    if (file.type === 'image/gif') { resolve({ blob: file, name: file.name }); return; }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        const name = file.name.replace(/\.[^.]+$/, '.jpg');
        resolve({ blob, name });
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve({ blob: file, name: file.name }); };
    img.src = url;
  });
}

async function handleUploadFile(file) {
  if (!file) return;
  const progress = document.getElementById('uploadProgress');
  const showProgress = (msg, isErr) => {
    if (!progress) return;
    progress.textContent = msg;
    progress.style.color = isErr ? 'var(--danger)' : 'var(--accent)';
    progress.classList.add('visible');
  };

  const kb = n => `${Math.round(n / 1024)} KB`;
  showProgress(`Compressing… (${kb(file.size)})`);

  const { blob, name: uploadFilename } = await compressImage(file);
  if (!blob) { showProgress('Compression failed — try a different image.', true); return; }

  showProgress(`Uploading… (${kb(blob.size)})`);

  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });

  try {
    const uploadPath = `assets/thumbs/${uploadFilename}`;
    await githubPut(uploadPath, base64, uploadFilename);

    const filename = uploadFilename;
    if (!thumbFiles.includes(filename)) thumbFiles.unshift(filename);
    pickThumb(uploadPath);

    showProgress(`✓ Uploaded: ${filename}`);
    setTimeout(() => { if (progress) progress.classList.remove('visible'); }, 3000);
  } catch (err) {
    showProgress('Upload failed: ' + err.message, true);
  }
}

async function saveAndPublish() {
  await saveAll();
}

// ── UTILS ─────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/// Keyboard shortcut: Cmd+S to save
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveAll(); }
});

function getGhToken() { return localStorage.getItem('adminGhToken') || ''; }

function promptGhToken() {
  const current = getGhToken();
  const token = prompt(
    'Enter your GitHub Personal Access Token (Contents: Read & Write).\nLeave blank to clear.',
    current
  );
  if (token === null) return; // cancelled
  if (token.trim()) {
    localStorage.setItem('adminGhToken', token.trim());
    updateTokenBtn(true);
    alert('Token saved. Uploads are now enabled.');
  } else {
    localStorage.removeItem('adminGhToken');
    updateTokenBtn(false);
  }
}

function updateTokenBtn(hasToken) {
  const btn = document.getElementById('ghTokenBtn');
  if (!btn) return;
  btn.textContent = hasToken ? '🔑 Token ✓' : '🔑 Token';
  btn.style.color = hasToken ? 'var(--success)' : '';
}

function sanitizeFilename(name) {
  const ext = name.substring(name.lastIndexOf('.')).toLowerCase();
  const base = name.substring(0, name.lastIndexOf('.'))
    .toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-_.]/g, '');
  return base + ext;
}

async function githubPut(path, content, filename) {
  const token = getGhToken();
  if (!token) throw new Error('No GitHub token — log out and enter your token to enable uploads.');
  const api = `https://api.github.com/repos/chowpeijunn/portfolio/contents/${path}`;
  const headers = {
    Authorization: `token ${token}`,
    Accept: 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
    'User-Agent': 'portfolio-admin'
  };
  // Get SHA if file already exists (required for overwrite)
  let sha;
  const existRes = await fetch(api, { headers });
  if (existRes.ok) { sha = (await existRes.json()).sha; }
  const body = { message: `Admin: upload ${filename}`, content };
  if (sha) body.sha = sha;
  const putRes = await fetch(api, { method: 'PUT', headers, body: JSON.stringify(body) });
  const putData = await putRes.json();
  if (!putRes.ok) throw new Error(putData.message || `GitHub ${putRes.status}`);
  return path;
}

async function pickShowreelVideo() {
  const picker = document.createElement('input');
  picker.type = 'file';
  picker.accept = 'video/*';
  picker.onchange = async () => {
    const file = picker.files[0];
    if (!file) return;
    if (file.size > 500 * 1024 * 1024) { alert('File too large (max 500 MB). Upload a compressed version.'); return; }
    const progress = document.getElementById('showreelVideoProgress');
    const btn = document.querySelector('[onclick="pickShowreelVideo()"]');
    if (progress) { progress.textContent = 'Uploading…'; progress.style.display = 'block'; progress.style.color = 'var(--accent)'; }
    if (btn) { btn.disabled = true; btn.textContent = '…'; }
    try {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const uploadPath = await githubPut(`assets/videos/${sanitizeFilename(file.name)}`, base64, file.name);
      data.showreelVideo = uploadPath;
      const input = document.getElementById('showreelVideoInput');
      if (input) input.value = uploadPath;
      if (progress) { progress.textContent = `✓ ${uploadPath}`; setTimeout(() => { progress.style.display = 'none'; }, 4000); }
    } catch (err) {
      if (progress) { progress.textContent = 'Upload failed: ' + err.message; progress.style.color = 'var(--danger)'; }
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '↑ Upload'; }
    }
  };
  picker.click();
}

// ── PASSWORD GATE (built dynamically so script order doesn't matter) ──────
function showPasswordGate(errMsg) {
  let gate = document.getElementById('passwordGate');
  if (!gate) {
    gate = document.createElement('div');
    gate.id = 'passwordGate';
    gate.style.cssText = 'position:fixed;inset:0;background:#0d0d0d;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;';
    gate.innerHTML = `
      <div style="font-size:20px;font-weight:700;color:#e0e0e0;">Portfolio Admin</div>
      <div style="font-size:13px;color:#666;text-align:center;max-width:280px;">Enter your admin password.<br>Add a GitHub token to enable image uploads.</div>
      <input id="passwordInput" type="password" placeholder="Admin password"
        style="background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px 16px;color:#e0e0e0;font-size:14px;outline:none;width:260px;margin-top:6px;" />
      <input id="ghTokenInput" type="password" placeholder="GitHub token (for uploads) — optional"
        style="background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px 16px;color:#e0e0e0;font-size:14px;outline:none;width:260px;" />
      <button id="passwordSubmit"
        style="background:#4f8ef7;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;">
        Continue
      </button>
      <div id="passwordErr" style="color:#e05252;font-size:12px;min-height:16px;"></div>
      <div style="font-size:11px;color:#444;max-width:280px;text-align:center;line-height:1.5;">Token needs <strong style="color:#555">Contents: Read &amp; Write</strong> on the portfolio repo. Generated at GitHub → Settings → Developer Settings → Fine-grained tokens.</div>`;
    document.body.appendChild(gate);
    document.getElementById('passwordSubmit').addEventListener('click', submitSecret);
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitSecret();
    });
  }
  gate.style.display = 'flex';
  if (errMsg) document.getElementById('passwordErr').textContent = errMsg;
}

async function submitSecret() {
  const val = document.getElementById('passwordInput').value.trim();
  if (!val) return;
  const ghToken = document.getElementById('ghTokenInput').value.trim();
  localStorage.setItem('adminSecret', val);
  if (ghToken) localStorage.setItem('adminGhToken', ghToken);
  document.getElementById('passwordGate').style.display = 'none';
  try {
    await init();
  } catch (e) {
    if (e.status === 401) {
      localStorage.removeItem('adminSecret');
      showPasswordGate('Wrong password — try again');
    } else {
      document.getElementById('editor').innerHTML =
        `<div style="padding:40px;color:#e05252;font-size:14px;">Error: ${e.message}</div>`;
    }
  }
}

// Start up
if (getAdminSecret()) {
  init().catch(e => {
    if (e.status === 401) {
      localStorage.removeItem('adminSecret');
      showPasswordGate('Session expired — please log in again');
    } else {
      document.getElementById('editor').innerHTML =
        `<div style="padding:40px;color:#e05252;font-size:14px;">Error: ${e.message}</div>`;
    }
  });
} else {
  showPasswordGate();
}
